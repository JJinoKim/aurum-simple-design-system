<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Slider, Progress</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); font-size: 15px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-subtext); width: 72px; flex-shrink: 0; }

  /* Slider */
  .slider { -webkit-appearance: none; width: 240px; height: 24px; background: transparent; outline: none; }
  .slider::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--color-primary) 0% 60%, var(--color-input) 60% 100%);
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: #fff; border: 1px solid var(--color-border);
    box-shadow: 0 1px 2px rgba(0,0,0,0.25); margin-top: -6px;
  }

  /* Progress */
  .progress { width: 240px; height: 4px; background: var(--color-input); border-radius: 999px; overflow: hidden; }
  .progress > i { display: block; height: 100%; background: var(--color-primary); border-radius: 999px; }

  .indeterminate { position: relative; }
  .indeterminate > i {
    position: absolute; top: 0; left: 0; height: 100%; width: 30%;
    background: var(--color-primary); border-radius: 999px;
    animation: sweep 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
  }
  @keyframes sweep { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }

  .val { font-feature-settings: 'tnum'; color: var(--color-subtext); font-size: 13px; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="label">Slider</span>
    <input class="slider" type="range" min="0" max="100" value="60" />
    <span class="val">60</span>
  </div>
  <div class="row">
    <span class="label">Progress</span>
    <div class="progress"><i style="width: 72%;"></i></div>
    <span class="val">72%</span>
  </div>
  <div class="row">
    <span class="label">Indet.</span>
    <div class="progress indeterminate"><i></i></div>
  </div>
</div>
</body></html>
