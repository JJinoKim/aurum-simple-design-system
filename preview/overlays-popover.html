<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Popover</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); height: 100vh; overflow: hidden; }
  .stage { position: relative; width: 100%; height: 100%; display: grid; place-items: center; }
  .anchor {
    background: var(--color-card); border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); height: 36px; padding: 0 14px;
    display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
    color: var(--color-text); font-family: var(--font-sans); font-weight: 500;
  }
  .anchor::after { content: ''; width: 6px; height: 6px; border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; transform: rotate(45deg); margin-top: -3px; opacity: 0.7; }
  .pop {
    position: absolute;
    top: calc(50% + 38px);
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 16px;
    box-shadow: var(--shadow-md);
    display: flex; flex-direction: column; gap: 12px;
  }
  .label { font-size: 12px; font-weight: 500; color: var(--color-subtext); letter-spacing: 0.02em; }
  .field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .field label { font-size: 12px; color: var(--color-subtext); }
  .input {
    background: var(--color-input); border: 1px solid var(--color-border);
    border-radius: var(--radius-xs); height: 32px; padding: 0 10px;
    color: var(--color-text); font-family: var(--font-sans); font-size: 13px;
  }
  .row { display: flex; gap: 8px; justify-content: flex-end; }
  .btn { font-family: var(--font-sans); font-weight: 500; font-size: 13px; height: 30px; padding: 0 12px; border-radius: var(--radius-xs); border: 1px solid; cursor: pointer; }
  .btn-primary { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--color-subtext); }
</style>
</head>
<body>
<div class="stage">
  <button class="anchor">Filter by date</button>
  <div class="pop" role="dialog">
    <div class="label">DATE RANGE</div>
    <div class="field">
      <label>From</label>
      <input class="input" value="Mar 12, 2025" />
    </div>
    <div class="field">
      <label>To</label>
      <input class="input" value="Apr 09, 2025" />
    </div>
    <div class="row">
      <button class="btn btn-ghost">Clear</button>
      <button class="btn btn-primary">Apply</button>
    </div>
  </div>
</div>
</body></html>
