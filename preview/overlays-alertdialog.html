<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — AlertDialog</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); height: 100vh; display: grid; place-items: center; overflow: hidden; }
  .stage { position: relative; width: 100%; height: 100%; display: grid; place-items: center; }
  .scrim { position: absolute; inset: 0; background: var(--color-scrim); }
  .dialog {
    position: relative;
    width: min(420px, calc(100% - 48px));
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column; gap: 12px;
  }
  .icon-row { display: flex; align-items: center; gap: 12px; }
  .icon { width: 32px; height: 32px; border-radius: 50%; background: rgba(226,75,74,0.12); display: grid; place-items: center; color: var(--color-error); font-weight: 600; flex-shrink: 0; }
  .title { margin: 0; font-size: 18px; font-weight: 600; line-height: 1.2; }
  .desc { margin: 0; font-size: 14px; line-height: 1.5; color: var(--color-subtext); }
  .footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .btn { font-family: var(--font-sans); font-weight: 500; font-size: 14px; height: 36px; padding: 0 16px; border-radius: var(--radius-sm); border: 1px solid; cursor: pointer; }
  .btn-secondary { background: var(--color-card); border-color: var(--color-border); color: var(--color-text); }
  .btn-danger { background: var(--color-error); border-color: var(--color-error); color: #fff; }
</style>
</head>
<body>
<div class="stage">
  <div class="scrim"></div>
  <div class="dialog" role="alertdialog" aria-modal="true">
    <div class="icon-row">
      <div class="icon">!</div>
      <h2 class="title">Delete project</h2>
    </div>
    <p class="desc">This permanently deletes <strong>Aurora&nbsp;Q3</strong> and all 248 documents inside it. This action cannot be undone.</p>
    <div class="footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-danger">Delete project</button>
    </div>
  </div>
</div>
</body></html>
