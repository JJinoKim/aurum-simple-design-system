<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Tabs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 32px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); }
  .tablist { display: inline-flex; gap: 24px; border-bottom: 1px solid var(--color-border); }
  .tab { padding: 8px 0; font-size: 14px; font-weight: 500; color: var(--color-subtext); border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; }
  .tab.active { color: var(--color-text); border-bottom-color: var(--color-primary); }
  .tab .badge {
    display: inline-block; margin-left: 6px;
    background: var(--color-surface); color: var(--color-subtext);
    font-size: 11px; padding: 1px 6px; border-radius: 999px;
  }
  .panel { padding: 20px 0 0; font-size: 14px; line-height: 1.6; color: var(--color-subtext); max-width: 520px; }
  .panel strong { color: var(--color-text); font-weight: 500; }
</style>
</head>
<body>
<div class="tablist" role="tablist">
  <div class="tab active" role="tab">Overview</div>
  <div class="tab" role="tab">Activity <span class="badge">12</span></div>
  <div class="tab" role="tab">Members</div>
  <div class="tab" role="tab">Settings</div>
</div>
<div class="panel" role="tabpanel">
  <strong>Aurora Q3</strong> · Last edited 14 minutes ago by Maya<br/>
  Tabs use a 2&nbsp;px underline at the bottom of the active trigger. Inactive
  tabs sit at <code>color.subtext</code>; active tabs are <code>color.text</code>.
  Spacing between triggers is <code>space[5]</code>.
</div>
</body></html>
