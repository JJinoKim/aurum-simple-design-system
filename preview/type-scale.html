<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 70px 1fr 80px; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--color-border); }
  .row:last-child { border-bottom: none; }
  .label { font-size: 11px; color: var(--color-subtext); letter-spacing: 0.04em; text-transform: uppercase; font-variant-numeric: tabular-nums; }
  .meta { font-size: 11px; color: var(--color-subtext); letter-spacing: 0.04em; text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row"><span class="label">36 / 3xl</span><span style="font-size:36px;font-weight:600;line-height:1.2;letter-spacing:-0.01em">Display</span><span class="meta">600 · 1.2</span></div>
  <div class="row"><span class="label">28 / 2xl</span><span style="font-size:28px;font-weight:600;line-height:1.2;letter-spacing:-0.01em">Heading 1</span><span class="meta">600 · 1.2</span></div>
  <div class="row"><span class="label">22 / xl</span><span style="font-size:22px;font-weight:600;line-height:1.2;letter-spacing:-0.01em">Heading 2</span><span class="meta">600 · 1.2</span></div>
  <div class="row"><span class="label">18 / lg</span><span style="font-size:18px;font-weight:500;line-height:1.2">Heading 3</span><span class="meta">500 · 1.2</span></div>
  <div class="row"><span class="label">15 / md</span><span style="font-size:15px;font-weight:400;line-height:1.45">Body — the default running text size.</span><span class="meta">400 · 1.45</span></div>
  <div class="row"><span class="label">13 / sm</span><span style="font-size:13px;font-weight:500;line-height:1.45">Label / caption</span><span class="meta">500 · 1.45</span></div>
  <div class="row"><span class="label">11 / xs</span><span style="font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase">MICRO · UNIT</span><span class="meta">500 · 1.45</span></div>
</body>
</html>
