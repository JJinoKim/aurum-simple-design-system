<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Tooltip</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); height: 100vh; display: grid; place-items: center; overflow: hidden; }
  .stage { display: flex; gap: 48px; align-items: flex-end; }
  .group { position: relative; display: flex; flex-direction: column; align-items: center; gap: 56px; }
  .icon-btn {
    width: 36px; height: 36px;
    background: var(--color-card); border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); display: grid; place-items: center;
    color: var(--color-subtext); cursor: pointer;
  }
  .tip {
    position: absolute; top: 0;
    background: var(--color-text); color: var(--color-background);
    font-size: 12px; padding: 4px 8px; border-radius: var(--radius-xs);
    box-shadow: var(--shadow-sm); white-space: nowrap; font-weight: 500;
  }
  .tip::after {
    content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%) rotate(45deg);
    width: 8px; height: 8px; background: var(--color-text);
  }
</style>
</head>
<body>
<div class="stage">
  <div class="group">
    <div class="tip">Duplicate (⌘D)</div>
    <div class="icon-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="5.5" y="0.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg></div>
  </div>
  <div class="group">
    <div class="tip">Share link</div>
    <div class="icon-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="3" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="11" cy="3" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="11" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M4.7 6L9.3 4M4.7 8L9.3 10" stroke="currentColor" stroke-width="1.5"/></svg></div>
  </div>
  <div class="group">
    <div class="tip">Archive</div>
    <div class="icon-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="3" width="11" height="3" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 6V12H11.5V6M5.5 8.5H8.5" stroke="currentColor" stroke-width="1.5"/></svg></div>
  </div>
</div>
</body></html>
