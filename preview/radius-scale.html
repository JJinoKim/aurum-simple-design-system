<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Radius scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box {
    width: 84px; height: 84px;
    background: var(--color-card);
    border: 1px solid var(--color-border);
  }
  .label { font-size: 11px; font-weight: 500; }
  .meta  { font-size: 11px; color: var(--color-subtext); letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="grid">
  <div class="item"><div class="box" style="border-radius:4px"></div><span class="label">xs</span><span class="meta">4 PX</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><span class="label">sm</span><span class="meta">8 PX</span></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><span class="label">md</span><span class="meta">12 PX</span></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><span class="label">lg</span><span class="meta">16 PX</span></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><span class="label">xl</span><span class="meta">24 PX</span></div>
</div>
</body>
</html>
