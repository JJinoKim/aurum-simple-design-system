<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 32px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); display: grid; gap: 16px; grid-template-columns: 1fr 1fr; align-items: start; }
  .card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-md); color: var(--color-text); }
  .card.raised { box-shadow: var(--shadow-sm); }
  .card .header { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--color-border); }
  .card .header.no-border { border-bottom: 0; }
  .card .header .text { flex: 1; min-width: 0; }
  .card .header h3 { margin: 0; font-size: 16px; font-weight: 600; line-height: 1.3; }
  .card .header p  { margin: 2px 0 0; font-size: 13px; color: var(--color-subtext); }
  .card .body { padding: 16px; font-size: 14px; line-height: 1.6; color: var(--color-text); }
  .card .footer { padding: 16px; border-top: 1px solid var(--color-border); display: flex; justify-content: flex-end; gap: 8px; }
  .btn { font-family: var(--font-sans); font-weight: 500; font-size: 13px; height: 32px; padding: 0 12px; border-radius: var(--radius-sm); border: 1px solid; cursor: pointer; }
  .btn-secondary { background: var(--color-card); border-color: var(--color-border); color: var(--color-text); }
  .btn-primary { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
  .meta { font-size: 11px; color: var(--color-subtext); letter-spacing: 0.06em; text-transform: uppercase; }
  .icon { width: 32px; height: 32px; border-radius: var(--radius-xs); background: var(--color-primary-subtle); color: var(--color-primary-text); display: grid; place-items: center; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">A</div>
      <div class="text">
        <h3>Aurora Q3</h3>
        <p>Last edited 14 minutes ago</p>
      </div>
    </div>
    <div class="body">A working draft of the Q3 retrospective for the platform team. Still pulling numbers from analytics; first review on Friday.</div>
    <div class="footer">
      <button class="btn btn-secondary">Share</button>
      <button class="btn btn-primary">Open</button>
    </div>
  </div>

  <div class="card raised">
    <div class="header no-border">
      <div class="text">
        <span class="meta">REPORT</span>
        <h3 style="margin-top: 4px">Weekly digest</h3>
      </div>
    </div>
    <div class="body" style="padding-top: 0">
      <div style="display: flex; gap: 24px;">
        <div><div style="font-size: 24px; font-weight: 600">+18%</div><div style="font-size: 12px; color: var(--color-subtext)">active users</div></div>
        <div><div style="font-size: 24px; font-weight: 600">3.2s</div><div style="font-size: 12px; color: var(--color-subtext)">median load</div></div>
        <div><div style="font-size: 24px; font-weight: 600">99.94%</div><div style="font-size: 12px; color: var(--color-subtext)">uptime</div></div>
      </div>
    </div>
  </div>
</body></html>
