<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Selection controls</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); font-size: 15px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-subtext); width: 72px; flex-shrink: 0; }
  .check { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
  .box { width: 16px; height: 16px; border: 1px solid var(--color-border); background: var(--color-input); border-radius: var(--radius-xs); display: inline-flex; align-items: center; justify-content: center; }
  .box.on { background: var(--color-primary); border-color: var(--color-primary); }
  .radio { width: 16px; height: 16px; border: 1px solid var(--color-border); background: var(--color-input); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
  .radio.on { border-color: var(--color-primary); }
  .radio.on::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--color-primary); }
  .switch { width: 36px; height: 20px; border-radius: 10px; border: 1px solid var(--color-border); background: var(--color-input); position: relative; }
  .switch.on { background: var(--color-primary); border-color: var(--color-primary); }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: left 200ms cubic-bezier(0.2, 0.8, 0.2, 1); }
  .switch.on::after { left: 18px; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="label">Checkbox</span>
    <span class="check"><span class="box"></span>Off</span>
    <span class="check"><span class="box on"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L4 7L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Checked</span>
    <span class="check"><span class="box on"><svg width="10" height="2" viewBox="0 0 10 2" fill="none"><path d="M1 1H9" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></span>Indeterminate</span>
  </div>
  <div class="row">
    <span class="label">Radio</span>
    <span class="check"><span class="radio"></span>Manual</span>
    <span class="check"><span class="radio on"></span>Auto</span>
    <span class="check" style="opacity: 0.5;"><span class="radio"></span>Off</span>
  </div>
  <div class="row">
    <span class="label">Switch</span>
    <span class="check"><span class="switch"></span>Off</span>
    <span class="check"><span class="switch on"></span>On</span>
  </div>
</div>
</body></html>
