<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Menu</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); height: 100vh; overflow: hidden; }
  .stage { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .anchor {
    background: var(--color-card); border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); height: 36px; padding: 0 14px;
    display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
    color: var(--color-text); font-family: var(--font-sans); font-weight: 500;
  }
  .anchor::after { content: ''; width: 6px; height: 6px; border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; transform: rotate(45deg); margin-top: -3px; opacity: 0.7; }
  .menu {
    min-width: 220px;
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 4px;
    box-shadow: var(--shadow-md);
    font-size: 14px;
  }
  .item {
    display: flex; align-items: center; gap: 8px;
    height: 32px; padding: 0 10px; border-radius: var(--radius-xs);
    color: var(--color-text); cursor: pointer; user-select: none;
  }
  .item .shortcut { margin-left: auto; color: var(--color-subtext); font-size: 12px; letter-spacing: 0.04em; }
  .item:hover, .item.is-active { background: var(--color-surface); }
  .item.danger { color: var(--color-error); }
  .check { width: 14px; opacity: 0; }
  .item.checked .check { opacity: 1; }
  .sep { height: 1px; background: var(--color-border); margin: 4px 0; }
  .label { font-size: 11px; color: var(--color-subtext); padding: 6px 10px 4px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="stage">
  <button class="anchor">Actions</button>
  <div class="menu" role="menu">
    <div class="label">Edit</div>
    <div class="item is-active">Duplicate <span class="shortcut">⌘D</span></div>
    <div class="item">Rename… <span class="shortcut">⌘R</span></div>
    <div class="item checked"><svg class="check" width="14" height="11" viewBox="0 0 14 11" fill="none"><path d="M1 5.5L5 9.5L13 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Pin to top</div>
    <div class="sep"></div>
    <div class="item danger">Move to trash <span class="shortcut">⌫</span></div>
  </div>
</div>
</body></html>
