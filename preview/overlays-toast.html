<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Toast</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); height: 100vh; overflow: hidden; }
  .stage { position: relative; width: 100%; height: 100%; }
  .stack { position: absolute; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; width: 340px; max-width: calc(100% - 48px); }
  .toast {
    background: var(--color-card); border: 1px solid var(--color-border);
    border-left: 3px solid var(--color-primary);
    border-radius: var(--radius-md); padding: 12px 16px;
    box-shadow: var(--shadow-md);
    display: flex; flex-direction: column; gap: 4px;
  }
  .toast.success { border-left-color: var(--color-success); }
  .toast.error   { border-left-color: var(--color-error); }
  .toast .title { font-size: 14px; font-weight: 500; color: var(--color-text); }
  .toast .desc  { font-size: 13px; color: var(--color-subtext); line-height: 1.45; }
  .toast .row   { display: flex; align-items: flex-start; gap: 8px; }
  .toast .row .title { flex: 1; }
  .toast .close { background: transparent; border: 0; color: var(--color-subtext); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; }
  .toast .action {
    align-self: flex-start; margin-top: 4px;
    background: transparent; border: 1px solid var(--color-border);
    color: var(--color-text); padding: 4px 10px; border-radius: var(--radius-xs);
    font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .label { position: absolute; top: 24px; left: 24px; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-subtext); }
</style>
</head>
<body>
<div class="stage">
  <div class="label">Notifications · bottom-right</div>
  <div class="stack">
    <div class="toast success">
      <div class="row">
        <div class="title">Document saved</div>
        <button class="close" aria-label="Dismiss">×</button>
      </div>
      <div class="desc">Q3 retrospective · synced 2 seconds ago</div>
    </div>
    <div class="toast">
      <div class="row">
        <div class="title">Shared with Maya</div>
        <button class="close" aria-label="Dismiss">×</button>
      </div>
      <div class="desc">She'll get an email and can edit immediately.</div>
      <button class="action">Undo</button>
    </div>
    <div class="toast error">
      <div class="row">
        <div class="title">Couldn't connect</div>
        <button class="close" aria-label="Dismiss">×</button>
      </div>
      <div class="desc">Working offline — changes will sync when you're back.</div>
    </div>
  </div>
</div>
</body></html>
