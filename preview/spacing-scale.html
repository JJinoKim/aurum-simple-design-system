<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 60px 1fr 60px; gap: 12px; align-items: center; padding: 7px 0; }
  .label { font-size: 11px; color: var(--color-subtext); letter-spacing: 0.04em; text-transform: uppercase; font-variant-numeric: tabular-nums; }
  .px { font-size: 11px; color: var(--color-text); text-align: right; font-variant-numeric: tabular-nums; }
  .bar { height: 12px; background: var(--color-primary); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><span class="label">space-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="label">space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="label">space-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="label">space-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="label">space-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="label">space-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="label">space-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="label">space-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
</body>
</html>
