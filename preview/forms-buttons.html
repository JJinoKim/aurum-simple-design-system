<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-background); color: var(--color-text); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-subtext); width: 72px; flex-shrink: 0; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); font-weight: 500;
    border: 1px solid; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 120ms cubic-bezier(0.2, 0.8, 0.2, 1);
    white-space: nowrap;
  }
  .btn-md { height: 36px; padding: 0 16px; font-size: 15px; }
  .btn-sm { height: 28px; padding: 0 12px; font-size: 13px; }
  .btn-lg { height: 44px; padding: 0 24px; font-size: 15px; }
  .btn-primary { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
  .btn-secondary { background: var(--color-card); border-color: var(--color-border); color: var(--color-text); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--color-text); }
  .btn-danger { background: var(--color-error); border-color: var(--color-error); color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="label">Variants</span>
    <button class="btn btn-md btn-primary">Primary</button>
    <button class="btn btn-md btn-secondary">Secondary</button>
    <button class="btn btn-md btn-ghost">Ghost</button>
    <button class="btn btn-md btn-danger">Danger</button>
  </div>
  <div class="row">
    <span class="label">Sizes</span>
    <button class="btn btn-sm btn-primary">Small</button>
    <button class="btn btn-md btn-primary">Medium</button>
    <button class="btn btn-lg btn-primary">Large</button>
  </div>
  <div class="row">
    <span class="label">States</span>
    <button class="btn btn-md btn-primary" disabled>Disabled</button>
    <button class="btn btn-md btn-secondary" disabled>Disabled</button>
  </div>
</div>
</body></html>
