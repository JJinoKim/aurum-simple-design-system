<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Aurum — Dark surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--color-background); color: var(--color-text); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chip { width: 100%; height: 40px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); }
  .row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .name { font-size: 13px; font-weight: 500; color: var(--color-text); }
  .hex { font-size: 11px; color: var(--color-subtext); font-variant-numeric: tabular-nums; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#1E1E1E"></div><div class="row"><span class="name">background</span><span class="hex">#1E1E1E</span></div></div>
  <div class="swatch"><div class="chip" style="background:#272727"></div><div class="row"><span class="name">surface</span><span class="hex">#272727</span></div></div>
  <div class="swatch"><div class="chip" style="background:#313131"></div><div class="row"><span class="name">card</span><span class="hex">#313131</span></div></div>
  <div class="swatch"><div class="chip" style="background:#3A3A3A"></div><div class="row"><span class="name">border</span><span class="hex">#3A3A3A</span></div></div>
  <div class="swatch"><div class="chip" style="background:#272727"></div><div class="row"><span class="name">input</span><span class="hex">#272727</span></div></div>
  <div class="swatch"><div class="chip" style="background:#E8E8E8"></div><div class="row"><span class="name">text</span><span class="hex">#E8E8E8</span></div></div>
  <div class="swatch"><div class="chip" style="background:#888888"></div><div class="row"><span class="name">subtext</span><span class="hex">#888888</span></div></div>
  <div class="swatch"><div class="chip" style="background:#666666"></div><div class="row"><span class="name">placeholder</span><span class="hex">#666666</span></div></div>
</div>
</body>
</html>
